<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate & Flip Images Online Free | Image Toolkit</title>
  <meta name="description" content="Rotate images 90掳, 180掳, 270掳 or flip horizontally and vertically. Free online tool, works in your browser.">
  <link rel="canonical" href="https://imagetoolkit-tau.vercel.app/tools/image-rotate.html">
  <link rel="stylesheet" href="../css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_ADSENSE_ID" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="../index.html" class="logo"><svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 22V10l8 6-8 6zM16 22V10l8 6-8 6z" fill="white"/></svg>Image Toolkit</a>
      <nav><a href="../index.html">Home</a><a href="webp-converter.html">Converter</a><a href="image-compressor.html">Compressor</a><a href="exif-viewer.html">EXIF</a><a href="color-palette.html">Palette</a><a href="image-to-base64.html">Base64</a></nav>
    </div>
  </header>
  <main class="container tool-container">
    <div class="tool-header"><h1>Rotate & Flip Images</h1><p>Rotate images by 90掳, 180掳, or 270掳. Flip horizontally or vertically. Preview changes instantly.</p></div>
    <div class="drop-zone" id="dropZone"><div class="dz-icon">馃攧</div><h3>Drop an image here or click to browse</h3><p>Supports all image formats</p><input type="file" id="fileInput" accept="image/*"></div>

    <div id="editor" style="display:none;">
      <div class="preview-area active"><canvas id="canvas" style="max-width:100%;max-height:400px;border:1px solid var(--border);border-radius:var(--radius);"></canvas></div>
      <div class="controls" style="margin-top:16px;">
        <button class="btn btn-primary" id="rotL">鈫?Rotate Left</button>
        <button class="btn btn-primary" id="rotR">鈫?Rotate Right</button>
        <button class="btn btn-secondary" id="rot180">馃攦 180掳</button>
        <button class="btn btn-secondary" id="flipH">鈫?Flip Horizontal</button>
        <button class="btn btn-secondary" id="flipV">鈫?Flip Vertical</button>
      </div>
      <div class="controls" style="margin-top:12px;">
        <button class="btn btn-success" id="dlBtn">Download</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
        <button class="btn btn-secondary" id="clearBtn">Clear</button>
      </div>
    </div>

    </main>
  <footer><p>&copy; 2026 Image Toolkit. <a href="../privacy.html">Privacy Policy</a></p></footer>

  <script>
    const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
    const editor=document.getElementById('editor'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
    let origImg,imgW,imgH,angle=0,flipX=1,flipY=1;

    dropZone.addEventListener('click',()=>fileInput.click());
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
    fileInput.addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});

    function load(f){
      const url=URL.createObjectURL(f);origImg=new Image();
      origImg.onload=()=>{imgW=origImg.width;imgH=origImg.height;angle=0;flipX=1;flipY=1;draw();editor.style.display='block';};
      origImg.src=url;
    }

    function draw(){
      const r=angle%360;const swap=r===90||r===270;
      canvas.width=swap?imgH:imgW;canvas.height=swap?imgW:imgH;
      ctx.save();ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.translate(canvas.width/2,canvas.height/2);
      ctx.scale(flipX,flipY);ctx.rotate(angle*Math.PI/180);
      ctx.drawImage(origImg,-imgW/2,-imgH/2);
      ctx.restore();
    }

    document.getElementById('rotL').addEventListener('click',()=>{angle-=90;draw();});
    document.getElementById('rotR').addEventListener('click',()=>{angle+=90;draw();});
    document.getElementById('rot180').addEventListener('click',()=>{angle+=180;draw();});
    document.getElementById('flipH').addEventListener('click',()=>{flipX*=-1;draw();});
    document.getElementById('flipV').addEventListener('click',()=>{flipY*=-1;draw();});
    document.getElementById('resetBtn').addEventListener('click',()=>{angle=0;flipX=1;flipY=1;draw();});
    document.getElementById('clearBtn').addEventListener('click',()=>{origImg=null;editor.style.display='none';fileInput.value='';ctx.clearRect(0,0,canvas.width,canvas.height);});

    document.getElementById('dlBtn').addEventListener('click',()=>{
      canvas.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rotated-image.png';a.click();toast('Downloaded!');},'image/png');
    });

    function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
  </script>
</body>
</html>
