<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Splitter - Split Images for Instagram Grid | Image Toolkit</title>
  <meta name="keywords" content="image splitter, split image into grid, instagram grid maker, slice photo, 3x3 grid splitter, cut image into pieces">
  <meta name="description" content="Split images into a grid. Create Instagram carousel posts, 3×3 grids, or any custom split layout.">
  <link rel="canonical" href="https://imagetoolkit-tau.vercel.app/tools/image-splitter.html">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="../index.html" class="logo"><svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#4f46e5"/><path d="M8 22V10l8 6-8 6zM16 22V10l8 6-8 6z" fill="white"/></svg>Image Toolkit</a>
      <nav><a href="../index.html">Home</a><a href="background-remover.html">AI BG</a><a href="format-converter.html">Convert</a><a href="image-compressor.html">Compress</a><a href="image-cropper.html">Crop</a></nav>
    </div>
  </header>
  <main class="container tool-container">
    <div class="tool-header"><h1>🧩 Image Grid Splitter</h1><p>Split any image into a grid of smaller images. Perfect for Instagram grid posts and carousels.</p></div>

    <div class="drop-zone" id="dropZone"><div class="dz-icon">🧩</div><h3>Drop an image here or click to browse</h3><p>Split into 2×2, 3×3, or custom grid</p><input type="file" id="fileInput" accept="image/*"></div>

    <div id="editor" style="display:none;">
      <div class="preview-area active"><img id="previewImg" style="max-height:300px;"></div>
      <div class="controls">
        <label>Grid: <select id="grid"><option value="2x2">2×2</option><option value="3x3" selected>3×3</option><option value="4x4">4×4</option><option value="1x3">1×3 (Horizontal)</option><option value="3x1">3×1 (Vertical)</option></select></label>
        <button class="btn btn-primary" id="splitBtn">Split Image</button>
      </div>
      <div id="pieces" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;"></div>
      <div class="controls"><button class="btn btn-success" id="dlAllBtn" style="display:none;">Download All as ZIP-like</button><button class="btn btn-secondary" id="clearBtn">Clear</button></div>
    </div>
  </main>
  <footer><p>&copy; 2026 Image Toolkit. <a href="../privacy.html">Privacy Policy</a></p></footer>
  <script>
    const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
    const editor=document.getElementById('editor'),previewImg=document.getElementById('previewImg');
    const pieces=document.getElementById('pieces'),dlAllBtn=document.getElementById('dlAllBtn');
    let img,blobs=[];

    dropZone.addEventListener('click',()=>fileInput.click());
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
    fileInput.addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});

    function load(f){const u=URL.createObjectURL(f);previewImg.src=u;img=new Image();img.onload=()=>{editor.style.display='block';};img.src=u;}

    document.getElementById('splitBtn').addEventListener('click',()=>{
      if(!img)return;blobs=[];pieces.innerHTML='';dlAllBtn.style.display='none';
      const g=document.getElementById('grid').value.split('x').map(Number);
      const pw=Math.floor(img.width/g[0]),ph=Math.floor(img.height/g[1]);
      for(let y=0;y<g[1];y++){for(let x=0;x<g[0];x++){
        const c=document.createElement('canvas');c.width=pw;c.height=ph;
        c.getContext('2d').drawImage(img,x*pw,y*ph,pw,ph,0,0,pw,ph);
        c.toBlob(b=>{
          blobs.push(b);const u=URL.createObjectURL(b);
          pieces.innerHTML+=`<div style="text-align:center;"><img src="${u}" style="width:120px;height:auto;border-radius:8px;border:1px solid var(--border);"><br><a href="#" onclick="event.preventDefault();dl('${u}','piece-${blobs.length}.png')" style="font-size:0.75rem;color:var(--primary);">Download</a></div>`;
          if(blobs.length===g[0]*g[1])dlAllBtn.style.display='inline-flex';
        },'image/png');
      }}
    });

    window.dl=function(u,n){const a=document.createElement('a');a.href=u;a.download=n;a.click();};
    dlAllBtn.addEventListener('click',()=>{blobs.forEach((b,i)=>{const u=URL.createObjectURL(b);dl(u,`piece-${i+1}.png`);});toast('Downloading all pieces...');});
    document.getElementById('clearBtn').addEventListener('click',()=>{img=null;blobs=[];editor.style.display='none';fileInput.value='';pieces.innerHTML='';dlAllBtn.style.display='none';});
    function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
  </script>
</body>
</html>
